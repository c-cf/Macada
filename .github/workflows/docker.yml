name: Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image-suffix: backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image-suffix: frontend
          - name: runtime
            context: ./backend
            dockerfile: ./backend/Dockerfile.runtime
            image-suffix: runtime

    steps:
      - uses: actions/checkout@v4

      # ghcr.io requires fully-lowercase image names
      - name: Compute lowercase image base
        id: image
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.base }}/${{ matrix.image-suffix }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.image.outputs.base }}/${{ matrix.image-suffix }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.base }}/${{ matrix.image-suffix }}:buildcache,mode=max
